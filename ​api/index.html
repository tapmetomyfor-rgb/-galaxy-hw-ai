<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Homework AI Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Kanit', 'Orbitron', sans-serif; 
        }
        /* พื้นหลังอวกาศแบบไล่เฉดลึก */
        .space-bg {
            background: radial-gradient(circle at 50% 50%, #100b26 0%, #070412 60%, #020105 100%);
            position: relative;
            overflow-x: hidden;
        }
        /* เอฟเฟกต์แสงกลุ่มดาวเนบิวลาเยื้องหลังแผงควบคุม */
        .nebula-purple {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            top: -10%;
            left: -10%;
            z-index: 0;
            pointer-events: none;
        }
        .nebula-cyan {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(6, 182, 212, 0.18) 0%, rgba(0, 0, 0, 0) 70%);
            bottom: -10%;
            right: -10%;
            z-index: 0;
            pointer-events: none;
        }
        /* แอนิเมชันหมุนแบบนุ่มนวลของสัญลักษณ์อะตอม */
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .animate-spin-slow {
            animation: spin-slow 8s linear infinite;
        }
    </style>
</head>
<body class="space-bg text-slate-100 min-h-screen flex items-center justify-center p-4 md:p-8">

    <div class="nebula-purple"></div>
    <div class="nebula-cyan"></div>

    <div class="max-w-xl w-full bg-[#090616]/80 backdrop-blur-2xl rounded-3xl shadow-[0_0_60px_rgba(147,51,234,0.25)] border border-purple-500/30 p-6 md:p-10 relative z-10 transition-all duration-500 hover:border-cyan-500/30">
        
        <div class="text-center mb-8 relative">
            <div class="inline-block p-4 bg-gradient-to-br from-purple-500/10 to-cyan-500/10 rounded-full mb-4 border border-cyan-500/30 shadow-[0_0_30px_rgba(6,182,212,0.25)]">
                <i class="fa-solid fa-shuttle-space text-4xl text-cyan-400 animate-pulse"></i>
            </div>
            <h1 class="text-3xl font-black tracking-widest bg-gradient-to-r from-cyan-400 via-fuchsia-400 to-purple-500 bg-clip-text text-transparent font-['Orbitron']">
                GALAXY HW AI
            </h1>
            <p class="text-purple-300/60 mt-1.5 text-xs font-semibold tracking-widest uppercase">ศูนย์บัญชาการวิเคราะห์การบ้านข้ามดวงดาว</p>
            <div class="w-24 h-[2px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent mx-auto mt-3"></div>
        </div>

        <form id="hwForm" class="space-y-6">
            <div>
                <label class="text-xs font-bold tracking-wider text-cyan-400/80 ml-1 block mb-2 uppercase">
                    <i class="fa-solid fa-planet-ringed mr-1.5 text-purple-400"></i> พิกัดวิชา (Subject Matrix)
                </label>
                <select id="subject" class="w-full bg-[#110b24] border border-purple-500/30 rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition text-slate-200 cursor-pointer shadow-inner font-medium">
                    <option value="ทั่วไป / อวกาศ">ทุกวิชา / ทั่วไป (General Mode)</option>
                    <option value="คณิตศาสตร์">คณิตศาสตร์ (Quantum Math)</option>
                    <option value="วิทยาศาสตร์">วิทยาศาสตร์ (Cosmology & Physics)</option>
                    <option value="ภาษาอังกฤษ">ภาษาอังกฤษ (Universal Language)</option>
                </select>
            </div>

            <div>
                <label class="text-xs font-bold tracking-wider text-cyan-400/80 ml-1 block mb-2 uppercase">
                    <i class="fa-solid fa-terminal mr-1.5 text-purple-400"></i> ป้อนข้อมูลโจทย์ (Data Input Terminal)
                </label>
                <textarea id="question" rows="3" placeholder="พิมพ์คำถามหรือโจทย์ที่ต้องการให้คอมพิวเตอร์หลักคำนวณ..." class="w-full bg-[#110b24] border border-purple-500/30 rounded-2xl px-4 py-3.5 focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500 outline-none transition resize-none placeholder-purple-400/20 text-slate-200 leading-relaxed"></textarea>
            </div>

            <div id="dropZone" class="group border-2 border-dashed border-purple-500/30 bg-[#110b24]/40 rounded-2xl p-6 text-center hover:border-cyan-400 hover:bg-cyan-500/5 transition-all duration-300 cursor-pointer shadow-lg">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
                <div id="uploadUi">
                    <i class="fa-solid fa-satellite-dish text-3xl text-purple-400 group-hover:text-cyan-400 mb-2.5 transition-transform duration-300 group-hover:scale-110 group-hover:rotate-12"></i>
                    <p class="text-sm text-purple-300/70 group-hover:text-cyan-300 transition-colors">ตรวจจับระบบภาพถ่ายโจทย์ (คลิกเพื่อสแกนไฟล์)</p>
                </div>
                <img id="preview" class="hidden max-h-44 mx-auto rounded-xl border border-cyan-500/50 shadow-[0_0_25px_rgba(6,182,212,0.4)] transition-all">
            </div>

            <button type="submit" id="btn" class="w-full bg-gradient-to-r from-purple-600 via-indigo-600 to-cyan-500 hover:shadow-[0_0_35px_rgba(147,51,234,0.5)] py-4 rounded-2xl font-bold tracking-widest text-white transition-all duration-300 flex items-center justify-center gap-2 border border-purple-400/20 active:scale-[0.99]">
                <i class="fa-solid fa-atom animate-spin-slow text-lg"></i> 
                <span class="font-['Orbitron'] text-sm">LAUNCH AI PROCESS</span>
            </button>
        </form>

        <div id="status" class="hidden mt-6 text-center text-cyan-400 text-xs tracking-widest font-['Orbitron'] bg-cyan-500/5 py-3 rounded-xl border border-cyan-500/20 animate-pulse">
            <i class="fa-solid fa-meteor animate-spin mr-2 text-sm"></i> ANALYZING DEEP SPACE DATA...
        </div>

        <div id="resultBox" class="hidden mt-8 bg-[#110b24] p-5 rounded-2xl border border-cyan-500/30 shadow-[0_0_20px_rgba(6,182,212,0.1)]">
            <h2 class="text-cyan-400 font-bold mb-3 flex items-center gap-2 text-sm tracking-wider uppercase border-b border-purple-500/20 pb-2.5">
                <i class="fa-solid fa-satellite-uplink text-purple-400"></i> ผลลัพธ์รหัสสัญญาณจากยานแม่:
            </h2>
            <div id="ans" class="text-slate-300 text-sm leading-relaxed overflow-y-auto max-h-64 whitespace-pre-wrap selection:bg-purple-500/30"></div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const uploadUi = document.getElementById('uploadUi');
        let base64Image = null;

        // เมื่อคลิกที่พื้นที่อัปโหลด ให้เปิดหน้าต่างเลือกไฟล์
        document.getElementById('dropZone').onclick = () => fileInput.click();

        // จัดการแปลงไฟล์ภาพเป็น Base64 String เพื่อส่งต่อให้ Serverless Backend
        fileInput.onchange = e => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = () => {
                    base64Image = reader.result;
                    preview.src = reader.result;
                    preview.classList.remove('hidden');
                    uploadUi.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // ฟังก์ชันส่งฟอร์มข้อมูลไปยังเส้นทางหลังบ้าน /api/homework
        document.getElementById('hwForm').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const resultBox = document.getElementById('resultBox');

            // ตรวจสอบขั้นต้นว่าใส่ข้อมูลมาหรือยัง
            if (!document.getElementById('question').value && !base64Image) {
                alert("🚨 ตรวจพบความว่างเปล่า! กรุณากรอกข้อความหรือใส่รูปภาพก่อนเริ่มส่งรหัส");
                return;
            }

            // เปิดสเตตัสโหลดปิดปุ่มกดเพื่อป้องกันการกดซ้ำ
            btn.disabled = true;
            status.classList.remove('hidden');
            resultBox.classList.add('hidden');

            try {
                const res = await fetch('/api/homework', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        subject: document.getElementById('subject').value,
                        question: document.getElementById('question').value,
                        image: base64Image
                    })
                });
                
                const data = await res.json();
                if(data.success) {
                    // แสดงคำตอบที่ส่งกลับมาจาก AI ลงในกล่องผลลัพธ์
                    document.getElementById('ans').innerText = data.answer;
                    resultBox.classList.remove('hidden');
                } else { 
                    alert("⚠️ ระบบขัดข้อง: ไม่สามารถถอดรหัสข้อมูลจากดาวเทียมได้"); 
                }
            } catch (err) { 
                alert("📡 ขาดการเชื่อมต่อ: สัญญาณอินเทอร์เน็ตขาดหายจากสถานีอวกาศ"); 
            } finally {
                // คืนสถานะปุ่มกดให้ทำงานต่อได้ตามปกติ
                btn.disabled = false;
                status.classList.add('hidden');
            }
        };
    </script>
</body>
</html>
